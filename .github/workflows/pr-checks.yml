name: PR Checks

on:
  pull_request:
  pull_request_review:
    types: [submitted]

permissions:
  contents: read

jobs:
  verify:
    if: ${{ github.event_name == 'pull_request' || github.event.review.state == 'approved' || contains(github.event.review.body || '', '/check') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: install
        run: npm ci
      - name: run verify
        run: npm run verify

name: PR Checks

on:
  pull_request:
  pull_request_review:
    types: [submitted]

permissions:
  contents: read

jobs:
  verify:
    if: ${{ github.event_name == 'pull_request' || github.event.review.state == 'approved' || contains(github.event.review.body || '', '/check') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: install
        run: npm ci
      - name: run verify
        run: npm run verify
